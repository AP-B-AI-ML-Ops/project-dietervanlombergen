services:
  # PostgreSQL database for our services
  database:
    build: ./backend-database
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql
    env_file:
      - ./backend-database/.env

  # MLFlow server for experiment tracking (uses the database)
  experiment-tracking:
    build: ./experiment-tracking
    ports:
      - 5000:5000
    depends_on:
      - database
    env_file:
      - ./backend-database/.env
    environment:
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DB: mlflow_db

  orchestration:
    build: ./backend-orchestration
    ports:
      - 4200:4200
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  # storage for persistent database usage
  postgres-data: